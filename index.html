<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a1a">
<title>Open Brain</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-primary: #0a0a1a;
  --bg-secondary: #111827;
  --surface: rgba(255,255,255,0.04);
  --surface-hover: rgba(255,255,255,0.08);
  --border: rgba(255,255,255,0.08);
  --border-focus: rgba(139,92,246,0.5);
  --text-primary: #f1f5f9;
  --text-secondary: #94a3b8;
  --text-muted: #64748b;
  --accent-violet: #8b5cf6;
  --accent-cyan: #06b6d4;
  --accent-amber: #f59e0b;
  --type-idea: #eab308;
  --type-question: #a78bfa;
  --type-task: #34d399;
  --type-reference: #38bdf8;
  --type-observation: #fb7185;
  --type-decision: #fbbf24;
  --type-untyped: #64748b;
  --radius-card: 16px;
  --radius-input: 12px;
  --radius-pill: 24px;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  background: linear-gradient(180deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
  color: var(--text-primary);
  min-height: 100vh;
  min-height: 100dvh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* Scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

/* Header */
.header {
  position: fixed; top:0; left:0; right:0; z-index:100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px;
  background: rgba(10,10,26,0.85);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
}
.header-left { display:flex; align-items:center; gap:8px; }
.pulse-dot {
  width:8px; height:8px; border-radius:50%;
  background: #34d399;
  animation: pulse 2s ease-in-out infinite;
}
.pulse-dot.disconnected { background: #ef4444; }
@keyframes pulse {
  0%,100% { box-shadow: 0 0 0 0 rgba(52,211,153,0.4); }
  50% { box-shadow: 0 0 0 6px rgba(52,211,153,0); }
}
.header-title { font-size:18px; font-weight:700; }
.header-right { font-size:13px; color: var(--accent-cyan); font-weight:500; }

/* Bottom Nav */
.bottom-nav {
  position: fixed; bottom:0; left:0; right:0; z-index:100;
  display: flex; justify-content: space-around; align-items: center;
  padding: 8px 0 max(8px, env(safe-area-inset-bottom));
  background: rgba(10,10,26,0.92);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
}
.nav-item {
  display:flex; flex-direction:column; align-items:center; gap:4px;
  padding:4px 12px; cursor:pointer; transition: all 0.2s;
  background:none; border:none; color: var(--text-muted); font-family:inherit;
}
.nav-item.active { color: var(--accent-cyan); }
.nav-item svg { width:22px; height:22px; }
.nav-item span { font-size:10px; font-weight:500; letter-spacing:0.02em; }

/* Content */
.content {
  padding: 60px 16px 80px;
  max-width: 640px;
  margin: 0 auto;
}

/* Screens */
.screen { display:none; animation: fadeIn 0.2s ease; }
.screen.active { display:block; }
@keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }

/* Glass Card */
.glass {
  background: var(--surface);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid var(--border);
  border-radius: var(--radius-card);
  padding: 16px;
  transition: transform 0.15s, background 0.15s;
}
.glass:hover { background: var(--surface-hover); }
.glass-interactive:active { transform: scale(0.98); }

/* Stat Cards */
.stats-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
  margin-bottom: 16px;
}
.stat-card { text-align:left; }
.stat-label {
  font-size:11px; font-weight:500; text-transform:uppercase;
  letter-spacing:0.1em; color:var(--text-muted); margin-bottom:8px;
}
.stat-number {
  font-size:36px; font-weight:700; line-height:1;
  background: linear-gradient(135deg, var(--accent-violet), var(--accent-cyan));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.sparkline { margin-top:10px; height:30px; }
.sparkline path { fill:none; stroke:var(--accent-cyan); stroke-width:2; opacity:0.6; }
.sparkline .area { fill:url(#sparkGrad); stroke:none; opacity:0.15; }

/* Donut Chart */
.donut-section { margin-bottom:16px; }
.donut-section h3 {
  font-size:11px; font-weight:500; text-transform:uppercase;
  letter-spacing:0.1em; color:var(--text-muted); margin-bottom:12px;
}
.donut-container { display:flex; align-items:center; gap:20px; }
.donut-chart { flex-shrink:0; }
.donut-legend { display:flex; flex-direction:column; gap:8px; flex:1; }
.legend-item { display:flex; align-items:center; justify-content:space-between; font-size:13px; }
.legend-left { display:flex; align-items:center; gap:8px; }
.legend-dot { width:8px; height:8px; border-radius:50%; }
.legend-count { color:var(--text-secondary); font-weight:500; }

/* Heatmap */
.heatmap-section { margin-bottom:16px; }
.heatmap-section h3 {
  font-size:11px; font-weight:500; text-transform:uppercase;
  letter-spacing:0.1em; color:var(--text-muted); margin-bottom:12px;
}
.heatmap-grid {
  display:grid; grid-template-columns: repeat(auto-fill, minmax(14px, 1fr));
  gap:3px;
}
.heatmap-cell {
  aspect-ratio:1; border-radius:3px;
  background: rgba(255,255,255,0.03);
  transition: background 0.2s;
}

/* Tag Cloud */
.tags-section { margin-bottom:16px; }
.tags-section h3 {
  font-size:11px; font-weight:500; text-transform:uppercase;
  letter-spacing:0.1em; color:var(--text-muted); margin-bottom:12px;
}
.tag-cloud { display:flex; flex-wrap:wrap; gap:8px; }
.tag-pill {
  padding:6px 14px; border-radius:var(--radius-pill);
  background: var(--surface); border:1px solid var(--border);
  font-size:13px; color:var(--text-secondary); cursor:default;
  transition: all 0.15s;
}
.tag-pill:hover { background:var(--surface-hover); color:var(--text-primary); }

/* People Row */
.people-section { margin-bottom:16px; }
.people-section h3 {
  font-size:11px; font-weight:500; text-transform:uppercase;
  letter-spacing:0.1em; color:var(--text-muted); margin-bottom:12px;
}
.people-row { display:flex; gap:10px; overflow-x:auto; padding-bottom:4px; }
.person-circle {
  width:44px; height:44px; border-radius:50%; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  font-size:13px; font-weight:600; color:white;
  background: linear-gradient(135deg, var(--accent-violet), var(--accent-cyan));
}

/* Capture */
.capture-textarea {
  width:100%; min-height:140px; padding:16px;
  background: var(--surface); border:1px solid var(--border);
  border-radius: var(--radius-card); color:var(--text-primary);
  font-family:inherit; font-size:15px; line-height:1.5; resize:vertical;
  transition: border-color 0.2s;
}
.capture-textarea:focus {
  outline:none; border-color:var(--border-focus);
  box-shadow: 0 0 0 3px rgba(139,92,246,0.1);
}
.capture-textarea::placeholder { color:var(--text-muted); }
.source-input {
  width:100%; padding:12px 16px; margin-top:12px;
  background: var(--surface); border:1px solid var(--border);
  border-radius: var(--radius-input); color:var(--text-primary);
  font-family:inherit; font-size:14px;
}
.source-input:focus { outline:none; border-color:var(--border-focus); }
.source-input::placeholder { color:var(--text-muted); }

.quick-types {
  display:flex; gap:10px; margin-top:16px; overflow-x:auto;
  padding-bottom:4px;
}
.quick-type-pill {
  display:flex; align-items:center; gap:6px;
  padding:10px 18px; border-radius: var(--radius-card);
  background: var(--surface); border:1px solid var(--border);
  color:var(--text-secondary); font-family:inherit; font-size:14px;
  font-weight:500; cursor:pointer; white-space:nowrap;
  transition: all 0.15s;
}
.quick-type-pill:hover, .quick-type-pill.active {
  background:var(--surface-hover); color:var(--text-primary);
}
.quick-type-pill .dot { width:8px; height:8px; border-radius:50%; }

.capture-btn {
  width:100%; padding:16px; margin-top:16px;
  background: linear-gradient(135deg, var(--accent-violet), var(--accent-cyan));
  border:none; border-radius:var(--radius-card);
  color:white; font-family:inherit; font-size:16px; font-weight:600;
  cursor:pointer; transition: all 0.2s; position:relative; overflow:hidden;
}
.capture-btn:hover { transform:translateY(-1px); box-shadow: 0 8px 30px rgba(139,92,246,0.3); }
.capture-btn:active { transform:scale(0.98); }
.capture-btn:disabled { opacity:0.5; cursor:not-allowed; transform:none; }

.recently-captured { margin-top:24px; }
.recently-captured h3 {
  font-size:11px; font-weight:500; text-transform:uppercase;
  letter-spacing:0.1em; color:var(--text-muted); margin-bottom:12px;
}

/* Search */
.search-bar {
  display:flex; gap:10px; align-items:center;
}
.search-input {
  flex:1; padding:14px 16px; padding-left:44px;
  background: var(--surface); border:1px solid var(--border);
  border-radius:var(--radius-card); color:var(--text-primary);
  font-family:inherit; font-size:15px;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.search-input:focus {
  outline:none; border-color:var(--accent-violet);
  box-shadow: 0 0 0 3px rgba(139,92,246,0.15), 0 0 20px rgba(139,92,246,0.1);
}
.search-input::placeholder { color:var(--text-muted); }
.search-wrap { position:relative; flex:1; }
.search-icon {
  position:absolute; left:14px; top:50%; transform:translateY(-50%);
  color:var(--text-muted); pointer-events:none;
}
.search-btn {
  padding:14px 20px; background: linear-gradient(135deg, var(--accent-violet), var(--accent-cyan));
  border:none; border-radius:var(--radius-card); color:white;
  font-family:inherit; font-size:14px; font-weight:600; cursor:pointer;
  transition: all 0.2s;
}
.search-btn:hover { transform:translateY(-1px); }
.filter-chips {
  display:flex; gap:8px; margin-top:12px; flex-wrap:wrap;
}
.filter-chip {
  padding:6px 14px; border-radius:var(--radius-pill);
  background:var(--surface); border:1px solid var(--border);
  color:var(--text-secondary); font-family:inherit; font-size:12px;
  font-weight:500; cursor:pointer; transition:all 0.15s;
}
.filter-chip.active {
  background:rgba(139,92,246,0.15); border-color:var(--accent-violet);
  color:var(--accent-violet);
}
.search-results { margin-top:16px; display:flex; flex-direction:column; gap:12px; }
.search-empty {
  text-align:center; padding:60px 20px; color:var(--text-muted);
}
.search-empty svg { width:64px; height:64px; margin-bottom:16px; opacity:0.3; }
.search-empty p { font-size:15px; }

/* Result Card */
.result-card { position:relative; }
.result-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
.result-score {
  display:flex; align-items:center; gap:6px;
  font-size:12px; color:var(--text-muted); font-weight:500;
}
.score-bar {
  width:40px; height:6px; border-radius:3px;
  background: rgba(255,255,255,0.06);
  overflow:hidden;
}
.score-fill {
  height:100%; border-radius:3px;
  background: linear-gradient(90deg, var(--accent-violet), var(--accent-cyan));
  transition: width 0.5s ease;
}
.result-content { font-size:14px; line-height:1.5; color:var(--text-secondary); margin-bottom:10px; }
.result-meta { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }

/* Type Badge */
.type-badge {
  display:inline-block; padding:3px 10px; border-radius:var(--radius-pill);
  font-size:11px; font-weight:600; text-transform:capitalize;
}
.type-badge.idea { background:rgba(234,179,8,0.15); color:var(--type-idea); }
.type-badge.question { background:rgba(167,139,250,0.15); color:var(--type-question); }
.type-badge.task { background:rgba(52,211,153,0.15); color:var(--type-task); }
.type-badge.reference { background:rgba(56,189,248,0.15); color:var(--type-reference); }
.type-badge.observation { background:rgba(251,113,133,0.15); color:var(--type-observation); }
.type-badge.decision { background:rgba(251,191,36,0.15); color:var(--type-decision); }
.type-badge.untyped, .type-badge.null { background:rgba(100,116,139,0.15); color:var(--type-untyped); }

.topic-tag {
  padding:2px 8px; border-radius:var(--radius-pill);
  background:rgba(255,255,255,0.05); font-size:11px;
  color:var(--text-muted);
}
.result-date { font-size:11px; color:var(--text-muted); margin-left:auto; }

/* Recent Timeline */
.timeline { position:relative; }
.timeline::before {
  content:''; position:absolute; left:7px; top:0; bottom:0; width:2px;
  background: linear-gradient(180deg, var(--accent-violet), var(--accent-cyan), transparent);
  border-radius:1px;
}
.day-group { margin-bottom:24px; }
.day-label {
  display:flex; align-items:center; gap:12px;
  font-size:13px; font-weight:600; color:var(--text-primary);
  margin-bottom:12px; position:relative;
}
.day-dot {
  width:16px; height:16px; border-radius:50%; flex-shrink:0;
  background: linear-gradient(135deg, var(--accent-violet), var(--accent-cyan));
  border: 3px solid var(--bg-primary);
  z-index:1;
}
.timeline-cards { display:flex; flex-direction:column; gap:10px; margin-left:28px; }
.timeline-card { cursor:pointer; }
.timeline-card-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
.timeline-card-content { font-size:14px; line-height:1.5; color:var(--text-secondary); }
.timeline-card-tags { display:flex; gap:6px; margin-top:8px; flex-wrap:wrap; }

.recent-filters { display:flex; gap:10px; margin-bottom:20px; }
.recent-filter {
  padding:8px 14px; border-radius:var(--radius-input);
  background:var(--surface); border:1px solid var(--border);
  color:var(--text-secondary); font-family:inherit; font-size:13px;
  cursor:pointer;
}
.recent-filter:focus { outline:none; border-color:var(--border-focus); }

/* Insights */
.signal-pills {
  display:flex; gap:8px; overflow-x:auto; padding-bottom:8px;
  margin-bottom:16px;
}
.signal-pill {
  display:flex; align-items:center; gap:6px;
  padding:8px 16px; border-radius:var(--radius-pill);
  background:var(--surface); border:1px solid var(--border);
  color:var(--text-secondary); font-family:inherit; font-size:13px;
  font-weight:500; cursor:pointer; white-space:nowrap;
  transition: all 0.15s;
}
.signal-pill.active {
  background:rgba(139,92,246,0.15); border-color:var(--accent-violet);
  color:var(--text-primary);
}
.signal-pill svg { width:16px; height:16px; }

.graph-container {
  border-radius:var(--radius-card); overflow:hidden;
  background:var(--surface); border:1px solid var(--border);
  margin-bottom:16px; min-height:350px; position:relative;
}
.graph-container svg { width:100%; height:100%; }
.graph-legend {
  display:flex; gap:16px; padding:8px 12px;
  position:absolute; top:8px; left:8px;
  background:rgba(10,10,26,0.7); border-radius:var(--radius-input);
  font-size:11px; color:var(--text-muted);
}
.graph-legend-item { display:flex; align-items:center; gap:4px; }

.insight-stats { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:16px; }
.insight-stat-number {
  font-size:28px; font-weight:700;
  background: linear-gradient(135deg, var(--accent-violet), var(--accent-cyan));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
}
.insight-stat-sub { font-size:12px; color:var(--text-muted); margin-top:2px; }

.patterns-section h3 {
  font-size:11px; font-weight:500; text-transform:uppercase;
  letter-spacing:0.1em; color:var(--text-muted); margin-bottom:12px;
}
.pattern-item {
  display:flex; align-items:center; gap:12px; padding:10px 0;
  border-bottom:1px solid var(--border);
}
.pattern-item:last-child { border-bottom:none; }
.pattern-icon {
  width:36px; height:36px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  background: linear-gradient(135deg, var(--accent-violet), var(--accent-cyan));
  flex-shrink:0;
}
.pattern-icon svg { width:18px; height:18px; color:white; }
.pattern-text { font-size:14px; font-weight:500; }
.pattern-sub { font-size:12px; color:var(--text-muted); margin-top:2px; }

/* Toast */
.toast {
  position:fixed; top:70px; right:16px; z-index:200;
  padding:12px 20px; border-radius:var(--radius-card);
  background:rgba(10,10,26,0.9); backdrop-filter:blur(16px);
  border:1px solid var(--border); color:var(--text-primary);
  font-size:14px; font-weight:500;
  transform:translateX(120%); transition: transform 0.3s ease;
}
.toast.show { transform:translateX(0); }
.toast.success { border-color:rgba(52,211,153,0.3); }
.toast.error { border-color:rgba(239,68,68,0.3); }

/* Skeleton */
.skeleton {
  background: linear-gradient(90deg, var(--surface) 25%, rgba(255,255,255,0.06) 50%, var(--surface) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
  border-radius:var(--radius-card);
}
@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

/* Connect Screen */
.connect-screen { text-align:center; padding:40px 20px; }
.connect-screen h2 { font-size:22px; margin-bottom:8px; }
.connect-screen p { color:var(--text-muted); margin-bottom:24px; font-size:14px; }
.key-input {
  width:100%; padding:14px 16px;
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius-input); color:var(--text-primary);
  font-family:'Inter',monospace; font-size:14px; text-align:center;
}
.key-input:focus { outline:none; border-color:var(--border-focus); }
.key-input::placeholder { color:var(--text-muted); }
.connect-btn {
  width:100%; padding:14px; margin-top:12px;
  background: linear-gradient(135deg, var(--accent-violet), var(--accent-cyan));
  border:none; border-radius:var(--radius-card);
  color:white; font-family:inherit; font-size:15px; font-weight:600;
  cursor:pointer;
}

/* Settings overlay */
.settings-overlay {
  display:none; position:fixed; top:0; left:0; right:0; bottom:0;
  background:rgba(0,0,0,0.6); z-index:300;
  align-items:flex-end; justify-content:center;
}
.settings-overlay.show { display:flex; }
.settings-sheet {
  width:100%; max-width:640px; padding:24px 16px 40px;
  background:var(--bg-secondary); border-radius:var(--radius-card) var(--radius-card) 0 0;
  border:1px solid var(--border); border-bottom:none;
}
.settings-sheet h3 { font-size:16px; margin-bottom:16px; }
.settings-sheet label { font-size:13px; color:var(--text-muted); display:block; margin-bottom:6px; }
.settings-sheet input { width:100%; padding:10px; margin-bottom:16px; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-input); color:var(--text-primary); font-family:monospace; font-size:12px; }
.settings-sheet input:focus { outline:none; border-color:var(--border-focus); }
.settings-actions { display:flex; gap:10px; }
.settings-actions button {
  flex:1; padding:12px; border-radius:var(--radius-card); font-family:inherit; font-size:14px; font-weight:600; cursor:pointer; border:none;
}
.btn-save { background: linear-gradient(135deg, var(--accent-violet), var(--accent-cyan)); color:white; }
.btn-disconnect { background:rgba(239,68,68,0.15); color:#ef4444; }
.btn-cancel { background:var(--surface); color:var(--text-secondary); border:1px solid var(--border) !important; }

/* Animated counter */
@keyframes countUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
.count-animated { animation: countUp 0.4s ease forwards; }
</style>
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="header-left">
    <div class="pulse-dot disconnected" id="statusDot"></div>
    <span class="header-title">Open Brain</span>
  </div>
  <div class="header-right" id="headerRight" style="cursor:pointer">tap to connect</div>
</header>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Content -->
<div class="content">

  <!-- Connect Screen -->
  <div class="screen active" id="connectScreen">
    <div class="connect-screen">
      <h2>Welcome to Open Brain</h2>
      <p>Enter your API key to connect:</p>
      <input type="password" class="key-input" id="keyInput" placeholder="Paste your API key...">
      <button class="connect-btn" onclick="connect()">Connect</button>
    </div>
  </div>

const SUPABASE_URL = 'https://ulyfanmimpduissivodl.supabase.co';

// ── API ──
async function api(path, opts = {}) {
  const method = opts.method || 'GET';
  const headers = {
    'Authorization': `Bearer ${ANON_KEY}`,
    'x-brain-key': API_KEY,
    'Content-Type': 'application/json'
  };
  const url = `${BASE}${path}`;
  const res = await fetch(url, { method, headers, body: opts.body ? JSON.stringify(opts.body) : undefined });
  if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
  return res.json();
}

async function connect() {

async function loadDashboard(statsData) {
  try {
    const stats = statsData || await api('/api/stats');
    document.getElementById('headerRight').textContent = `${stats.total_thoughts || 0} thoughts`;
    renderStats(stats);
    renderDonut(stats.by_type || []);
    renderHeatmap(stats);
    renderTopics(stats.top_topics || []);
    renderPeople(stats.top_people || []);
  } catch(e) { console.error('Dashboard load error:', e); }
}

function renderStats(stats) {
  const grid = document.getElementById('statsGrid');
  const items = [
    { label: 'Total Thoughts', value: stats.total_thoughts || 0 },
    { label: 'Types', value: stats.type_count || Object.keys(stats.by_type || {}).length || 0 },
    { label: 'Top Topics', value: (stats.top_topics || []).length },
    { label: 'People', value: (stats.top_people || []).length }
  ];
  grid.innerHTML = items.map((item, i) => `
    <div class="glass stat-card">
      <div class="stat-label">${item.label}</div>
      <div class="stat-number count-animated" style="animation-delay:${i*0.1}s">${item.value}</div>
      <div class="sparkline"><svg viewBox="0 0 100 30" preserveAspectRatio="none">
        <defs><linearGradient id="sparkGrad${i}" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="var(--accent-cyan)" stop-opacity="0.3"/><stop offset="1" stop-color="var(--accent-cyan)" stop-opacity="0"/></linearGradient></defs>
        ${randomSparkline(i)}
      </svg></div>
    </div>
  `).join('');
}

function randomSparkline(seed) {
  const pts = [];
  let y = 15;
  for (let x = 0; x <= 100; x += 10) {
    y = Math.max(5, Math.min(25, y + (Math.sin(seed * 3 + x * 0.2) * 6)));
    pts.push([x, y]);
  }
  const line = pts.map((p, i) => (i === 0 ? 'M' : 'L') + p[0] + ',' + p[1]).join(' ');
  const area = line + ` L100,30 L0,30 Z`;
  return `<path d="${line}" fill="none" stroke="var(--accent-cyan)" stroke-width="2" opacity="0.7"/>
          <path d="${area}" fill="url(#sparkGrad${seed})" opacity="0.2"/>`;
}

function renderDonut(byType) {
  const container = document.getElementById('donutChart');
  const legend = document.getElementById('donutLegend');
  let data = [];
  if (Array.isArray(byType)) {
    data = byType.map(t => ({ type: t.type || t.name || 'untyped', count: t.count || t.value || 0 }));
  } else if (typeof byType === 'object') {
    data = Object.entries(byType).map(([k, v]) => ({ type: k, count: typeof v === 'number' ? v : (v.count || 0) }));
  }
  data.sort((a, b) => b.count - a.count);
  const total = data.reduce((s, d) => s + d.count, 0) || 1;
  const colors = { idea: 'var(--type-idea)', question: 'var(--type-question)', task: 'var(--type-task)', reference: 'var(--type-reference)', observation: 'var(--type-observation)', decision: 'var(--type-decision)', null: 'var(--type-untyped)', untyped: 'var(--type-untyped)' };

  const size = 120, r = 46, cx = size/2, cy = size/2, sw = 14;
  let angle = -90;
  let paths = '';
  data.forEach(d => {
    const pct = d.count / total;
    const a1 = angle * Math.PI / 180;
    angle += pct * 360;
    const a2 = angle * Math.PI / 180;
    const large = pct > 0.5 ? 1 : 0;
    const x1 = cx + r * Math.cos(a1), y1 = cy + r * Math.sin(a1);
    const x2 = cx + r * Math.cos(a2), y2 = cy + r * Math.sin(a2);
    const color = colors[d.type] || colors['untyped'];
    paths += `<path d="M${x1},${y1} A${r},${r} 0 ${large},1 ${x2},${y2}" fill="none" stroke="${color}" stroke-width="${sw}" stroke-linecap="round"/>`;
  });
  container.innerHTML = `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">${paths}
    <text x="${cx}" y="${cy}" text-anchor="middle" dominant-baseline="central" fill="var(--text-primary)" font-size="18" font-weight="700">${total}</text></svg>`;
  legend.innerHTML = data.slice(0, 6).map(d => {
    const color = colors[d.type] || colors['untyped'];
    return `<div class="legend-item"><div class="legend-left"><span class="legend-dot" style="background:${color}"></span><span>${d.type || 'untyped'}</span></div><span class="legend-count">${d.count}</span></div>`;
  }).join('');
}

function renderHeatmap(stats) {
  const grid = document.getElementById('heatmapGrid');
  const cells = [];
  for (let i = 0; i < 91; i++) {
    const intensity = Math.random();
    let bg;
    if (intensity < 0.1) bg = 'rgba(255,255,255,0.03)';
    else if (intensity < 0.3) bg = 'rgba(139,92,246,0.15)';
    else if (intensity < 0.5) bg = 'rgba(139,92,246,0.3)';
    else if (intensity < 0.7) bg = 'rgba(6,182,212,0.3)';
    else bg = 'rgba(6,182,212,0.5)';
    cells.push(`<div class="heatmap-cell" style="background:${bg}"></div>`);
  }
  grid.innerHTML = cells.join('');
}

function renderTopics(topics) {

function renderPeople(people) {

    'linear-gradient(135deg, #06b6d4, #34d399)',
    'linear-gradient(135deg, #f59e0b, #ef4444)',
    'linear-gradient(135deg, #ec4899, #8b5cf6)',
    'linear-gradient(135deg, #34d399, #3b82f6)',
    'linear-gradient(135deg, #f97316, #eab308)',
  ];
  row.innerHTML = people.slice(0, 10).map((p, i) => {
    const name = p.person || p.name || p;
    const initials = name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);

  }).join('');

async function captureThought() {
  const text = document.getElementById('captureText').value.trim();
  if (!text) return;
  const btn = document.getElementById('captureBtn');
  btn.disabled = true; btn.textContent = 'Capturing...';
  const source = document.getElementById('captureSource').value.trim() || undefined;
  const activeType = document.querySelector('.quick-type-pill.active');
  try {
    const body = { text };
    if (source) body.source_context = { source };
    const res = await api('/api/capture', { method: 'POST', body });
    showToast('Thought captured!');
    document.getElementById('captureText').value = '';
    document.getElementById('captureSource').value = '';
    document.querySelectorAll('.quick-type-pill').forEach(p => p.classList.remove('active'));

    const thought = res.thought || res;
    recentCaptures.unshift({ text, type: thought.type || (activeType ? activeType.dataset.type : null), topics: thought.topics || [], time: 'just now' });
    renderRecentCaptures();
  } catch(e) {
    showToast('Capture failed: ' + e.message, 'error');
  }
  btn.disabled = false; btn.textContent = 'Capture';
}

function renderRecentCaptures() {
  const section = document.getElementById('recentlyCapSection');
  const container = document.getElementById('recentlyCaptured');
  if (recentCaptures.length === 0) { section.style.display = 'none'; return; }
  section.style.display = 'block';
  container.innerHTML = recentCaptures.slice(0, 3).map(c => `
    <div class="glass" style="animation:fadeIn 0.3s ease">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
        <span class="type-badge ${c.type || 'untyped'}">${c.type || 'untyped'}</span>
        <span style="font-size:11px;color:var(--text-muted)">${c.time}</span>
      </div>
      <div style="font-size:14px;color:var(--text-secondary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${c.text}</div>
      ${c.topics.length ? `<div style="display:flex;gap:4px;margin-top:6px;flex-wrap:wrap">${c.topics.map(t => `<span class="topic-tag">${t}</span>`).join('')}</div>` : ''}
    </div>
  `).join('');

async function searchThoughts() {
  const query = document.getElementById('searchInput').value.trim();
  if (!query) return;
  const container = document.getElementById('searchResults');
  container.innerHTML = '<div class="skeleton" style="height:80px;margin-bottom:10px"></div><div class="skeleton" style="height:80px;margin-bottom:10px"></div><div class="skeleton" style="height:80px"></div>';
  try {
    const data = await api(`/api/search?q=${encodeURIComponent(query)}&limit=20`);
    const results = data.results || data;
    const activeFilter = document.querySelector('#searchFilters .filter-chip.active')?.dataset.filter;
    const filtered = activeFilter && activeFilter !== 'all' ? results.filter(r => r.type === activeFilter) : results;
    if (filtered.length === 0) {
      container.innerHTML = '<div class="search-empty"><p>No matching thoughts found</p></div>';
      return;
    }
    container.innerHTML = filtered.map(r => {
      const score = r.similarity != null ? Math.round(r.similarity * 100) : null;
      const topics = r.topics || [];
      const type = r.type || 'untyped';
      const date = r.created_at ? new Date(r.created_at).toLocaleDateString('en-GB', { day:'numeric', month:'short' }) : '';
      return `<div class="glass result-card">
        <div class="result-header">
          <span class="type-badge ${type}">${type}</span>
          ${score !== null ? `<div class="result-score"><div class="score-bar"><div class="score-fill" style="width:${score}%"></div></div>${score}%</div>` : ''}
        </div>
        <div class="result-content">${(r.content || '').slice(0, 180)}${(r.content || '').length > 180 ? '...' : ''}</div>
        <div class="result-meta">
          ${topics.slice(0, 3).map(t => `<span class="topic-tag">${t}</span>`).join('')}
          <span class="result-date">${date}</span>
        </div>
      </div>`;
    }).join('');
  } catch(e) {
    container.innerHTML = `<div class="search-empty"><p>Search failed: ${e.message}</p></div>`;
  }
}

// ── Recent ──
async function loadRecent() {
  const timeline = document.getElementById('timeline');
  timeline.innerHTML = '<div class="skeleton" style="height:60px;margin-bottom:10px;margin-left:28px"></div>'.repeat(4);
  const typeFilter = document.getElementById('recentTypeFilter').value;
  const days = document.getElementById('recentTimeFilter').value;
  try {
    let url = `/api/recent?limit=50&since_days=${days}`;
    if (typeFilter) url += `&type=${typeFilter}`;
    const data = await api(url);
    const items = data.thoughts || data.results || data;
    if (!items.length) { timeline.innerHTML = '<p style="color:var(--text-muted);text-align:center;padding:40px">No recent thoughts</p>'; return; }
    const groups = groupByDay(items);
    timeline.innerHTML = '';
    groups.forEach(group => {
      const dayEl = document.createElement('div');
      dayEl.className = 'day-group';
      dayEl.innerHTML = `<div class="day-label"><div class="day-dot"></div>${group.label}</div>
        <div class="timeline-cards">${group.items.map(item => {
          const type = item.type || 'untyped';
          const topics = item.topics || [];
          const time = new Date(item.created_at).toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' });
          return `<div class="glass timeline-card glass-interactive">
            <div class="timeline-card-header">
              <span class="type-badge ${type}">${type}</span>
              <span style="font-size:11px;color:var(--text-muted)">${time}</span>
            </div>
            <div class="timeline-card-content">${(item.content || '').slice(0, 120)}${(item.content || '').length > 120 ? '...' : ''}</div>
            ${topics.length ? `<div class="timeline-card-tags">${topics.slice(0, 4).map(t => `<span class="topic-tag">${t}</span>`).join('')}</div>` : ''}
          </div>`;
        }).join('')}</div>`;
      timeline.appendChild(dayEl);
    });
  } catch(e) { timeline.innerHTML = `<p style="color:var(--text-muted);text-align:center">Error: ${e.message}</p>`; }
}

document.getElementById('recentTypeFilter').addEventListener('change', loadRecent);

function groupByDay(items) {
  const now = new Date();
  const today = now.toDateString();
  const yesterday = new Date(now - 86400000).toDateString();
  const groups = {};
  items.forEach(item => {
    const d = new Date(item.created_at);
    const ds = d.toDateString();
    let label;
    if (ds === today) label = 'Today';
    else if (ds === yesterday) label = 'Yesterday';
    else {
      const diff = Math.floor((now - d) / 86400000);
      label = diff <= 7 ? 'This Week' : d.toLocaleDateString('en-GB', { day:'numeric', month:'short' });
    }
    if (!groups[label]) groups[label] = [];
    groups[label].push(item);
  });
  const order = ['Today', 'Yesterday', 'This Week'];
  return Object.entries(groups)
    .sort((a, b) => {
      const ai = order.indexOf(a[0]), bi = order.indexOf(b[0]);
      if (ai !== -1 && bi !== -1) return ai - bi;
      if (ai !== -1) return -1;
      if (bi !== -1) return 1;
      return 0;
    })
    .map(([label, items]) => ({ label, items }));
}

// ── Insights ──
const signals = [
  { id: 'network', label: 'Network', icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="M8.59 13.51l6.83 3.98M15.41 6.51l-6.82 3.98"/></svg>' },
  { id: 'resonance', label: 'Resonance', icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12h2l3-9 4 18 4-18 3 9h4"/></svg>' },
  { id: 'bridges', label: 'Bridges', icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3m0 18v-3a2 2 0 0 1 2-2h3M3 16h3a2 2 0 0 1 2 2v3"/></svg>' },
  { id: 'drift', label: 'Drift', icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/><path d="M2 12h20"/></svg>' },
  { id: 'gaps', label: 'Gaps', icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="4"/></svg>' },
  { id: 'tension', label: 'Tension', icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>' },
  { id: 'gravity', label: 'Gravity', icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>' },
];

let activeSignal = 'network';

function loadInsights() {
  const pills = document.getElementById('signalPills');
  pills.innerHTML = signals.map(s =>
    `<button class="signal-pill ${s.id === activeSignal ? 'active' : ''}" data-signal="${s.id}">${s.icon}${s.label}</button>`
  ).join('');
  pills.querySelectorAll('.signal-pill').forEach(p => {
    p.addEventListener('click', () => {
      activeSignal = p.dataset.signal;
      loadInsights();
    });
  });
  loadSignal(activeSignal);
}

async function loadSignal(signal) {
  const container = document.getElementById('insightContent');
  container.innerHTML = '<div class="skeleton" style="height:350px;margin-bottom:16px"></div>';
  try {
    if (signal === 'network') {
      const data = await api('/api/analyze/topics');
      renderNetwork(data, container);
    } else if (signal === 'resonance') {
      const data = await api('/api/analyze/topics');
      renderResonance(data, container);
    } else if (signal === 'bridges') {
      const data = await api('/api/analyze/people');
      renderBridges(data, container);
    } else {
      const data = await api('/api/analyze/timeline');
      renderGenericInsight(signal, data, container);
    }
  } catch(e) {
    container.innerHTML = `<div class="glass" style="padding:40px;text-align:center;color:var(--text-muted)"><p>Could not load ${signal}: ${e.message}</p></div>`;
  }
}

function renderNetwork(data, container) {
  const nodes = [];
  const links = [];
  const topics = (data.topics || data.nodes || data).slice(0, 20);
  topics.forEach((t, i) => {
    const name = t.topic || t.name || t;
    const count = t.count || t.weight || 5;
    nodes.push({ id: name, type: 'topic', r: Math.max(8, Math.min(30, count * 1.5)) });
  });
  for (let i = 0; i < nodes.length; i++) {
    for (let j = i + 1; j < nodes.length; j++) {
      if (Math.random() > 0.7) links.push({ source: nodes[i].id, target: nodes[j].id });
    }
  }
  const width = Math.min(600, window.innerWidth - 32);
  const height = 350;
  container.innerHTML = `<div class="graph-container" style="height:${height}px;position:relative">
    <div class="graph-legend"><div class="graph-legend-item"><span style="width:8px;height:8px;border-radius:50%;background:var(--accent-cyan)"></span>Topic</div>
    <div class="graph-legend-item"><span style="width:8px;height:8px;border-radius:50%;background:var(--accent-violet)"></span>Person</div></div>
    <svg id="networkSvg"></svg></div>
    <div class="insight-stats"><div class="glass"><div class="stat-label">Topic Clusters</div><div class="insight-stat-number">${nodes.length}</div></div>
    <div class="glass"><div class="stat-label">Connections</div><div class="insight-stat-number">${links.length}</div></div></div>`;

  const svg = d3.select('#networkSvg').attr('width', width).attr('height', height);
  const sim = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(links).id(d => d.id).distance(60))
    .force('charge', d3.forceManyBody().strength(-80))
    .force('center', d3.forceCenter(width / 2, height / 2))
    .force('collision', d3.forceCollide(d => d.r + 4));

  const link = svg.selectAll('line').data(links).enter().append('line')
    .attr('stroke', 'rgba(139,92,246,0.2)').attr('stroke-width', 1);
  const node = svg.selectAll('g').data(nodes).enter().append('g').call(
    d3.drag().on('start', (e, d) => { if (!e.active) sim.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
    .on('drag', (e, d) => { d.fx = e.x; d.fy = e.y; })
    .on('end', (e, d) => { if (!e.active) sim.alphaTarget(0); d.fx = null; d.fy = null; })
  );
  node.append('circle').attr('r', d => d.r).attr('fill', d => d.type === 'topic' ? 'rgba(6,182,212,0.6)' : 'rgba(139,92,246,0.6)')
    .attr('stroke', d => d.type === 'topic' ? 'var(--accent-cyan)' : 'var(--accent-violet)').attr('stroke-width', 1.5);
  node.append('text').text(d => d.id).attr('fill', 'var(--text-secondary)').attr('font-size', d => Math.max(9, d.r * 0.45))
    .attr('text-anchor', 'middle').attr('dy', d => d.r + 14).style('font-family', 'Inter, sans-serif');

  sim.on('tick', () => {
    link.attr('x1', d => d.source.x).attr('y1', d => d.source.y).attr('x2', d => d.target.x).attr('y2', d => d.target.y);
    node.attr('transform', d => `translate(${d.x},${d.y})`);
  });
}

function renderResonance(data, container) {
  const topics = (data.topics || data.nodes || data).slice(0, 10);
  container.innerHTML = `<div class="glass"><h3 style="font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-muted);margin-bottom:12px">Topic Resonance</h3>
    ${topics.map(t => {
      const name = t.topic || t.name || t;
      const count = t.count || t.weight || 5;
      const pct = Math.min(100, count * 3);
      return `<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
        <span style="font-size:13px;color:var(--text-secondary);min-width:100px">${name}</span>
        <div style="flex:1;height:8px;background:rgba(255,255,255,0.04);border-radius:4px;overflow:hidden">
          <div style="width:${pct}%;height:100%;background:linear-gradient(90deg,var(--accent-violet),var(--accent-cyan));border-radius:4px;transition:width 0.5s"></div>
        </div>
        <span style="font-size:12px;color:var(--text-muted);min-width:24px;text-align:right">${count}</span>
      </div>`;
    }).join('')}
  </div>`;
}

function renderBridges(data, container) {
  const people = (data.people || data.nodes || data).slice(0, 8);
  container.innerHTML = `<div class="glass patterns-section"><h3>People Network</h3>
    ${people.map(p => {
      const name = p.person || p.name || p;
      const count = p.count || p.weight || 1;
      return `<div class="pattern-item">
        <div class="pattern-icon"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>
        <div><div class="pattern-text">${name}</div><div class="pattern-sub">${count} thought${count !== 1 ? 's' : ''}</div></div>
      </div>`;
    }).join('')}
  </div>`;
}

function renderGenericInsight(signal, data, container) {
  const items = data.timeline || data.entries || data.items || (Array.isArray(data) ? data : []);
  container.innerHTML = `<div class="glass" style="padding:40px;text-align:center">
    <div style="font-size:36px;margin-bottom:12px;background:linear-gradient(135deg,var(--accent-violet),var(--accent-cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:700">${signal.charAt(0).toUpperCase() + signal.slice(1)}</div>
    <p style="color:var(--text-muted);font-size:14px">${items.length || 0} data points analyzed</p>
    <p style="color:var(--text-secondary);font-size:13px;margin-top:8px">Visualization coming in next update</p>
  </div>`;
}

// ── Enter key on connect ──
document.getElementById('keyInput').addEventListener('keydown', e => { if (e.key === 'Enter') connect(); });
