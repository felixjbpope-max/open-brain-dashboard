<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a1a1a">
<title>Open Brain</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  /* Paper & ink palette */
  --bg-primary: #1a1a1a;
  --bg-page: #f5f0e8;
  --bg-page-alt: #efe9de;
  --bg-card: #faf6ef;
  --bg-card-hover: #f0ebe2;
  --border: #d8d0c4;
  --border-light: #e8e2d8;
  --ink-primary: #2c2416;
  --ink-secondary: #5a4e3e;
  --ink-muted: #8c7e6a;
  --ink-faint: #b8aa96;
  --accent: #8b6b3d;
  --accent-light: #c4a265;
  --accent-wash: rgba(139,107,61,0.08);
  --accent-wash-strong: rgba(139,107,61,0.15);
  --type-idea: #c4883a;
  --type-question: #7a6bab;
  --type-task: #5a8a6a;
  --type-reference: #5a7fa0;
  --type-observation: #b06a6a;
  --type-decision: #9a8540;
  --type-untyped: #8c7e6a;
  --radius: 8px;
  --radius-sm: 6px;
  --radius-pill: 20px;
  --shadow-sm: 0 1px 3px rgba(44,36,22,0.06);
  --shadow-md: 0 4px 12px rgba(44,36,22,0.08);
  --shadow-lg: 0 8px 24px rgba(44,36,22,0.1);
  --serif: 'EB Garamond', Georgia, 'Times New Roman', serif;
  --sans: 'Inter', system-ui, -apple-system, sans-serif;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: var(--sans);
  background: var(--bg-primary);
  color: var(--ink-primary);
  min-height: 100vh;
  min-height: 100dvh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* Scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* Layout */
.header {
  position: fixed; top:0; left:0; right:0; z-index:100;
  display:flex; justify-content:space-between; align-items:center;
  padding: 0 20px; height:56px;
  background: var(--bg-page);
  border-bottom: 1px solid var(--border);
}
.header-left { display:flex; align-items:center; gap:10px; }
.header-title {
  font-family: var(--serif);
  font-size: 22px; font-weight: 600;
  color: var(--ink-primary);
  letter-spacing: -0.01em;
}
.header-right {
  font-family: var(--sans);
  font-size: 12px; color: var(--ink-muted);
  font-weight: 500; letter-spacing: 0.02em;
  text-transform: uppercase;
}

.pulse-dot {
  width:8px; height:8px; border-radius:50%;
  background: var(--accent);
  box-shadow: 0 0 0 3px rgba(139,107,61,0.2);
}
.pulse-dot.disconnected {
  background: var(--ink-faint);
  box-shadow: none;
}

.content {
  margin-top:56px; margin-bottom:68px;
  min-height: calc(100vh - 124px);
  background: var(--bg-page);
}

.screen { display:none; padding:20px 16px; max-width:640px; margin:0 auto; }
.screen.active { display:block; }

.bottom-nav {
  position:fixed; bottom:0; left:0; right:0; z-index:100;
  display:flex; justify-content:space-around;
  height:68px; align-items:center;
  background: var(--bg-page);
  border-top: 1px solid var(--border);
}
.nav-item {
  display:flex; flex-direction:column; align-items:center; gap:3px;
  background:none; border:none; color:var(--ink-faint);
  font-family:var(--sans); font-size:10px; font-weight:500;
  cursor:pointer; transition: color 0.2s;
  letter-spacing: 0.03em; text-transform: uppercase;
  padding: 8px 12px;
}
.nav-item svg { width:22px; height:22px; stroke-width:1.5; }
.nav-item.active { color: var(--accent); }
.nav-item:hover { color: var(--ink-secondary); }

/* Cards */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border-light);
  border-radius: var(--radius);
  padding: 16px;
  box-shadow: var(--shadow-sm);
  transition: box-shadow 0.2s, transform 0.15s;
}
.card-interactive:hover {
  box-shadow: var(--shadow-md);
  transform: translateY(-1px);
}

/* Section Headers */
.section-title {
  font-family: var(--serif);
  font-size: 18px; font-weight: 500;
  color: var(--ink-primary);
  margin-bottom: 14px;
  letter-spacing: -0.01em;
}
.section-label {
  font-size: 10px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.1em;
  color: var(--ink-faint);
  margin-bottom: 10px;
}

/* Stats Grid */
.stats-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:20px; }
.stat-card {
  background: var(--bg-card);
  border: 1px solid var(--border-light);
  border-radius: var(--radius);
  padding: 16px;
  box-shadow: var(--shadow-sm);
}
.stat-label {
  font-size: 11px; font-weight: 500;
  text-transform: uppercase; letter-spacing: 0.06em;
  color: var(--ink-muted);
  margin-bottom: 6px;
}
.stat-number {
  font-family: var(--serif);
  font-size: 32px; font-weight: 600;
  color: var(--ink-primary);
  line-height: 1;
}
.stat-sub {
  font-size: 11px; color: var(--ink-faint);
  margin-top: 4px;
}

/* Donut / Distribution */
.donut-section { margin-bottom:20px; }
.donut-container {
  display: flex; align-items: center; gap: 24px;
  padding: 16px 0;
}
.donut-legend { flex:1; }
.legend-item {
  display:flex; justify-content:space-between; align-items:center;
  padding: 5px 0; font-size:13px; color:var(--ink-secondary);
}
.legend-left { display:flex; align-items:center; gap:8px; text-transform:capitalize; }
.legend-dot { width:8px; height:8px; border-radius:50%; }
.legend-count { font-weight:500; color:var(--ink-muted); font-size:12px; }

/* Heatmap */
.heatmap-section { margin-bottom:20px; }
.heatmap-grid {
  display:grid; grid-template-columns: repeat(13, 1fr);
  gap:3px; padding: 8px 0;
}
.heatmap-cell {
  aspect-ratio:1; border-radius:2px;
  background: var(--bg-page-alt);
}

/* Tag Cloud */
.tags-section { margin-bottom:20px; }
.tag-cloud { display:flex; flex-wrap:wrap; gap:8px; padding:8px 0; }
.tag-pill {
  padding: 5px 14px;
  background: var(--accent-wash);
  border: 1px solid rgba(139,107,61,0.12);
  border-radius: var(--radius-pill);
  font-size: 12px; font-weight: 500;
  color: var(--accent);
  transition: all 0.15s;
}
.tag-pill:hover {
  background: var(--accent-wash-strong);
}

/* People */
.people-section { margin-bottom:20px; }
.people-row { display:flex; gap:10px; overflow-x:auto; padding:8px 0; }
.person-circle {
  width:42px; height:42px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:14px; font-weight:600; color:white;
  flex-shrink:0; cursor:pointer;
  transition: transform 0.15s;
}
.person-circle:hover { transform:scale(1.1); }

/* Capture */
.capture-textarea {
  width:100%; min-height:160px; padding:16px 18px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--ink-primary);
  font-family: var(--serif); font-size:16px; line-height:1.7;
  resize:vertical; box-shadow: var(--shadow-sm);
  transition: border-color 0.2s, box-shadow 0.2s;
}
.capture-textarea:focus {
  outline:none; border-color:var(--accent);
  box-shadow: var(--shadow-md);
}
.capture-textarea::placeholder { color:var(--ink-faint); font-style:italic; }

.source-input {
  width:100%; padding:12px 16px; margin-top:12px;
  background: var(--bg-card); border:1px solid var(--border-light);
  border-radius: var(--radius-sm); color:var(--ink-primary);
  font-family: var(--sans); font-size:13px;
  box-shadow: var(--shadow-sm);
}
.source-input:focus { outline:none; border-color:var(--accent); }
.source-input::placeholder { color:var(--ink-faint); }

.quick-types {
  display:flex; gap:8px; margin-top:14px; overflow-x:auto;
  padding-bottom:4px;
}
.quick-type-pill {
  display:flex; align-items:center; gap:6px;
  padding:8px 16px; border-radius: var(--radius-pill);
  background: var(--bg-card); border:1px solid var(--border-light);
  color:var(--ink-muted); font-family:var(--sans); font-size:13px;
  font-weight:500; cursor:pointer; white-space:nowrap;
  transition: all 0.15s; box-shadow: var(--shadow-sm);
}
.quick-type-pill:hover {
  border-color: var(--border);
  color:var(--ink-secondary);
}
.quick-type-pill.active {
  background:var(--accent-wash-strong); color:var(--accent);
  border-color:var(--accent);
}
.quick-type-pill .dot { width:7px; height:7px; border-radius:50%; }

.capture-btn {
  width:100%; padding:14px; margin-top:16px;
  background: var(--accent);
  border:none; border-radius:var(--radius);
  color: #faf6ef; font-family:var(--sans); font-size:14px; font-weight:600;
  cursor:pointer; transition: all 0.2s;
  letter-spacing: 0.03em; text-transform: uppercase;
  box-shadow: var(--shadow-md);
}
.capture-btn:hover { background: #7a5c34; box-shadow: var(--shadow-lg); }
.capture-btn:active { transform:scale(0.98); }
.capture-btn:disabled { opacity:0.5; cursor:not-allowed; transform:none; }

.recently-captured { margin-top:24px; }
.recently-captured h3 {
  font-size:10px; font-weight:600; text-transform:uppercase;
  letter-spacing:0.1em; color:var(--ink-faint); margin-bottom:10px;
}

/* Search */
.search-bar { display:flex; gap:10px; align-items:center; }
.search-input {
  flex:1; padding:12px 16px; padding-left:40px;
  background: var(--bg-card); border:1px solid var(--border);
  border-radius:var(--radius); color:var(--ink-primary);
  font-family:var(--sans); font-size:14px;
  box-shadow: var(--shadow-sm);
  transition: border-color 0.2s, box-shadow 0.2s;
}
.search-input:focus {
  outline:none; border-color:var(--accent);
  box-shadow: var(--shadow-md);
}
.search-input::placeholder { color:var(--ink-faint); }
.search-wrap { position:relative; flex:1; }
.search-icon {
  position:absolute; left:12px; top:50%; transform:translateY(-50%);
  color:var(--ink-faint); pointer-events:none;
}
.search-btn {
  padding:12px 20px; background:var(--accent);
  border:none; border-radius:var(--radius); color:#faf6ef;
  font-family:var(--sans); font-size:13px; font-weight:600; cursor:pointer;
  transition: all 0.2s; letter-spacing:0.03em; text-transform:uppercase;
  box-shadow: var(--shadow-sm);
}
.search-btn:hover { background:#7a5c34; }
.filter-chips {
  display:flex; gap:6px; margin-top:12px; flex-wrap:wrap;
}
.filter-chip {
  padding:5px 14px; border-radius:var(--radius-pill);
  background:transparent; border:1px solid var(--border-light);
  color:var(--ink-muted); font-family:var(--sans); font-size:12px;
  font-weight:500; cursor:pointer; transition:all 0.15s;
}
.filter-chip:hover { border-color:var(--border); color:var(--ink-secondary); }
.filter-chip.active {
  background:var(--accent-wash-strong); border-color:var(--accent);
  color:var(--accent);
}
.search-results { margin-top:16px; display:flex; flex-direction:column; gap:10px; }
.search-empty {
  text-align:center; padding:60px 20px; color:var(--ink-faint);
}
.search-empty svg { width:48px; height:48px; margin-bottom:16px; opacity:0.3; }
.search-empty p { font-size:14px; font-style:italic; font-family:var(--serif); }

/* Result Card */
.result-card { position:relative; }
.result-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
.result-score {
  display:flex; align-items:center; gap:6px;
  font-size:11px; color:var(--ink-faint); font-weight:500;
}
.score-bar {
  width:40px; height:5px; border-radius:3px;
  background: var(--bg-page-alt);
  overflow:hidden;
}
.score-fill {
  height:100%; border-radius:3px;
  background: var(--accent);
  transition: width 0.5s ease;
}
.result-content {
  font-family: var(--serif);
  font-size:15px; line-height:1.6; color:var(--ink-secondary); margin-bottom:10px;
}
.result-meta { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }

/* Type Badge */
.type-badge {
  display:inline-block; padding:2px 10px; border-radius:var(--radius-pill);
  font-size:10px; font-weight:600; text-transform:uppercase;
  letter-spacing:0.05em;
}
.type-badge.idea { background:rgba(196,136,58,0.12); color:var(--type-idea); }
.type-badge.question { background:rgba(122,107,171,0.12); color:var(--type-question); }
.type-badge.task { background:rgba(90,138,106,0.12); color:var(--type-task); }
.type-badge.reference { background:rgba(90,127,160,0.12); color:var(--type-reference); }
.type-badge.observation { background:rgba(176,106,106,0.12); color:var(--type-observation); }
.type-badge.decision { background:rgba(154,133,64,0.12); color:var(--type-decision); }
.type-badge.untyped, .type-badge.null { background:rgba(140,126,106,0.12); color:var(--type-untyped); }

.topic-tag {
  padding:2px 8px; border-radius:var(--radius-pill);
  background:var(--accent-wash); font-size:11px;
  color:var(--ink-muted);
}
.result-date { font-size:11px; color:var(--ink-faint); margin-left:auto; font-style:italic; }

/* Recent Timeline */
.timeline { position:relative; }
.timeline::before {
  content:''; position:absolute; left:7px; top:0; bottom:0; width:1px;
  background: var(--border);
}
.day-group { margin-bottom:24px; }
.day-label {
  display:flex; align-items:center; gap:12px;
  font-family: var(--serif);
  font-size:16px; font-weight:500; color:var(--ink-primary);
  margin-bottom:12px; position:relative;
}
.day-dot {
  width:14px; height:14px; border-radius:50%; flex-shrink:0;
  background: var(--accent);
  border: 3px solid var(--bg-page);
  z-index:1;
}
.timeline-cards { display:flex; flex-direction:column; gap:10px; margin-left:28px; }
.timeline-card { cursor:pointer; }
.timeline-card-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
.timeline-card-content {
  font-family: var(--serif);
  font-size:14px; line-height:1.6; color:var(--ink-secondary);
}
.timeline-card-tags { display:flex; gap:6px; margin-top:8px; flex-wrap:wrap; }

.recent-filters { display:flex; gap:10px; margin-bottom:20px; }
.recent-filter {
  padding:8px 14px; border-radius:var(--radius-sm);
  background:var(--bg-card); border:1px solid var(--border-light);
  color:var(--ink-secondary); font-family:var(--sans); font-size:12px;
  cursor:pointer; box-shadow: var(--shadow-sm);
  -webkit-appearance: none; appearance: none;
}
.recent-filter:focus { outline:none; border-color:var(--accent); }

/* Insights */
.signal-pills {
  display:flex; gap:6px; overflow-x:auto; padding-bottom:8px;
  margin-bottom:16px;
}
.signal-pill {
  display:flex; align-items:center; gap:5px;
  padding:7px 14px; border-radius:var(--radius-pill);
  background:transparent; border:1px solid var(--border-light);
  color:var(--ink-muted); font-family:var(--sans); font-size:12px;
  font-weight:500; cursor:pointer; white-space:nowrap;
  transition: all 0.15s;
}
.signal-pill.active {
  background:var(--accent-wash-strong); border-color:var(--accent);
  color:var(--accent);
}
.signal-pill svg { width:14px; height:14px; }

.graph-container {
  border-radius:var(--radius); overflow:hidden;
  background:var(--bg-card); border:1px solid var(--border-light);
  margin-bottom:16px; min-height:350px; position:relative;
  box-shadow: var(--shadow-sm);
}
.graph-container svg { width:100%; height:100%; }
.graph-legend {
  display:flex; gap:14px; padding:6px 10px;
  position:absolute; top:8px; left:8px;
  background:rgba(250,246,239,0.9); border-radius:var(--radius-sm);
  border:1px solid var(--border-light);
  font-size:10px; color:var(--ink-muted); font-weight:500;
  text-transform:uppercase; letter-spacing:0.05em;
}
.graph-legend-item { display:flex; align-items:center; gap:4px; }

.insight-stats { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:16px; }
.insight-stat-number {
  font-family: var(--serif);
  font-size:28px; font-weight:600;
  color: var(--accent);
}
.insight-stat-sub { font-size:11px; color:var(--ink-faint); margin-top:2px; }

.patterns-section h3 {
  font-size:10px; font-weight:600; text-transform:uppercase;
  letter-spacing:0.1em; color:var(--ink-faint); margin-bottom:12px;
}
.pattern-item {
  display:flex; align-items:center; gap:12px; padding:10px 0;
  border-bottom:1px solid var(--border-light);
}
.pattern-item:last-child { border-bottom:none; }
.pattern-icon {
  width:36px; height:36px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  background: var(--accent);
  flex-shrink:0;
}
.pattern-icon svg { width:18px; height:18px; color:white; }
.pattern-text { font-size:14px; font-weight:500; color:var(--ink-primary); }
.pattern-sub { font-size:12px; color:var(--ink-faint); margin-top:2px; }

/* Toast */
.toast {
  position:fixed; top:70px; right:16px; z-index:200;
  padding:12px 20px; border-radius:var(--radius);
  background:var(--bg-card); border:1px solid var(--border);
  box-shadow: var(--shadow-lg);
  color:var(--ink-primary);
  font-size:13px; font-weight:500;
  transform:translateX(120%); transition: transform 0.3s ease;
}
.toast.show { transform:translateX(0); }
.toast.success { border-left: 3px solid var(--type-task); }
.toast.error { border-left: 3px solid var(--type-observation); }

/* Skeleton */
.skeleton {
  background: linear-gradient(90deg, var(--bg-page-alt) 25%, var(--bg-card) 50%, var(--bg-page-alt) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
  border-radius:var(--radius);
}
@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

/* Connect Screen */
.connect-screen { text-align:center; padding:60px 20px; }
.connect-screen h2 {
  font-family:var(--serif); font-size:28px; font-weight:500;
  margin-bottom:8px; color:var(--ink-primary);
}
.connect-screen p {
  color:var(--ink-muted); margin-bottom:28px; font-size:14px;
  font-style:italic;
}
.key-input {
  width:100%; padding:14px 16px;
  background:var(--bg-card); border:1px solid var(--border);
  border-radius:var(--radius); color:var(--ink-primary);
  font-family:var(--sans); font-size:14px; text-align:center;
  box-shadow: var(--shadow-sm);
}
.key-input:focus { outline:none; border-color:var(--accent); }
.key-input::placeholder { color:var(--ink-faint); }
.connect-btn {
  width:100%; padding:14px; margin-top:12px;
  background:var(--accent); border:none; border-radius:var(--radius);
  color:#faf6ef; font-family:var(--sans); font-size:14px; font-weight:600;
  cursor:pointer; letter-spacing:0.03em; text-transform:uppercase;
  box-shadow: var(--shadow-md);
  transition: background 0.2s;
}
.connect-btn:hover { background:#7a5c34; }

/* Settings overlay */
.settings-overlay {
  display:none; position:fixed; top:0; left:0; right:0; bottom:0;
  background:rgba(44,36,22,0.4); z-index:300;
  align-items:flex-end; justify-content:center;
  backdrop-filter: blur(2px);
}
.settings-overlay.show { display:flex; }
.settings-sheet {
  width:100%; max-width:640px; padding:24px 16px 40px;
  background:var(--bg-page); border-radius:var(--radius) var(--radius) 0 0;
  border:1px solid var(--border); border-bottom:none;
  box-shadow: var(--shadow-lg);
}
.settings-sheet h3 {
  font-family:var(--serif); font-size:18px; font-weight:500;
  margin-bottom:16px; color:var(--ink-primary);
}
.settings-sheet label {
  font-size:11px; color:var(--ink-muted); display:block; margin-bottom:6px;
  font-weight:500; text-transform:uppercase; letter-spacing:0.06em;
}
.settings-sheet input {
  width:100%; padding:10px; margin-bottom:16px;
  background:var(--bg-card); border:1px solid var(--border-light);
  border-radius:var(--radius-sm); color:var(--ink-primary);
  font-family:monospace; font-size:12px;
}
.settings-sheet input:focus { outline:none; border-color:var(--accent); }
.settings-actions { display:flex; gap:10px; }
.settings-actions button {
  flex:1; padding:12px; border-radius:var(--radius); font-family:var(--sans);
  font-size:13px; font-weight:600; cursor:pointer; border:none;
  letter-spacing:0.03em; text-transform:uppercase;
}
.btn-save { background:var(--accent); color:#faf6ef; }
.btn-save:hover { background:#7a5c34; }
.btn-disconnect { background:rgba(176,106,106,0.12); color:var(--type-observation); }
.btn-cancel { background:var(--bg-card); color:var(--ink-muted); border:1px solid var(--border-light) !important; }

/* Animated counter */
@keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
.fade-in { animation: fadeIn 0.3s ease forwards; }

/* Decorative rules */
.divider {
  width:40px; height:1px;
  background:var(--border);
  margin: 16px 0;
}

/* Paper texture overlay - subtle noise */
.content::before {
  content: '';
  position: fixed;
  top: 56px; left: 0; right: 0; bottom: 68px;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
}
.screen { position: relative; z-index: 1; }

/* Thought detail modal */
.thought-modal {
  display:none; position:fixed; top:0; left:0; right:0; bottom:0;
  background:rgba(44,36,22,0.5); z-index:250;
  align-items:center; justify-content:center;
  padding:20px; backdrop-filter:blur(2px);
}
.thought-modal.show { display:flex; }
.thought-modal-content {
  width:100%; max-width:540px;
  background:var(--bg-card); border-radius:var(--radius);
  border:1px solid var(--border-light);
  box-shadow: var(--shadow-lg);
  padding:24px; max-height:80vh; overflow-y:auto;
}
.thought-modal-close {
  float:right; background:none; border:none;
  color:var(--ink-faint); cursor:pointer; font-size:20px;
  line-height:1; padding:0 4px;
}
.thought-modal-close:hover { color:var(--ink-primary); }
.thought-modal-text {
  font-family:var(--serif); font-size:16px; line-height:1.7;
  color:var(--ink-primary); margin:16px 0;
  white-space: pre-wrap;
}
.thought-modal-meta {
  display:flex; gap:8px; flex-wrap:wrap; margin-top:12px;
  padding-top:12px; border-top:1px solid var(--border-light);
}
</style>
</head>

<script>
// ── Config ──
const SUPABASE_URL = 'https://ulyfanmimpduissivodl.supabase.co';
const ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVseWZhbm1pbXBkdWlzc2l2b2RsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NzM2MTEsImV4cCI6MjA4ODE0OTYxMX0.cZsMHpzs43SsaycAkvUWaqAtE1C4BfjdEG-ekliOIcE';
const BASE = `${SUPABASE_URL}/functions/v1/open-brain-mcp`;

let API_KEY = localStorage.getItem('ob_key') || '';
let connected = false;
let recentCaptures = [];
let allThoughts = []; // Cache for modal lookups

// ── API ──
async function api(path, opts = {}) {
  const method = opts.method || 'GET';
  const headers = {
    'Authorization': `Bearer ${ANON_KEY}`,
    'x-brain-key': API_KEY,
    'Content-Type': 'application/json'
  };
  const url = `${BASE}${path}`;
  const res = await fetch(url, { method, headers, body: opts.body ? JSON.stringify(opts.body) : undefined });
  if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
  return res.json();
}

// ── Toast ──
function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ── Modal ──
function showThoughtModal(thought) {
  const modal = document.getElementById('thoughtModal');
  const body = document.getElementById('thoughtModalBody');
  const type = thought.type || 'untyped';
  const date = thought.created_at ? new Date(thought.created_at).toLocaleDateString('en-GB', { day:'numeric', month:'long', year:'numeric' }) : '';
  const time = thought.created_at ? new Date(thought.created_at).toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' }) : '';
  const topics = thought.topics || [];
  const source = thought.source_context?.source || '';

  body.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
      <span class="type-badge ${type}">${type}</span>
      <span style="font-size:12px;color:var(--ink-faint);font-style:italic">${date} ${time ? '· ' + time : ''}</span>
    </div>
    <div class="thought-modal-text">${thought.content || thought.text || ''}</div>
    ${source ? `<div style="font-size:12px;color:var(--ink-muted);margin-bottom:8px"><strong>Source:</strong> ${source}</div>` : ''}
    ${topics.length ? `<div class="thought-modal-meta">${topics.map(t => `<span class="topic-tag">${t}</span>`).join('')}</div>` : ''}
  `;
  modal.classList.add('show');
}
function closeModal() { document.getElementById('thoughtModal').classList.remove('show'); }
document.getElementById('thoughtModal').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) closeModal();
});

// ── Connect ──
async function connect() {
  const key = document.getElementById('keyInput').value.trim();
  if (!key) return;
  API_KEY = key;
  try {
    const data = await api('/api/stats');
    localStorage.setItem('ob_key', key);
    connected = true;
    document.getElementById('statusDot').classList.remove('disconnected');
    document.getElementById('headerRight').textContent = `${data.total_thoughts || 0} thoughts`;
    document.getElementById('connectScreen').classList.remove('active');
    document.getElementById('dashboardScreen').classList.add('active');
    document.querySelector('[data-tab="dashboard"]').classList.add('active');
    loadDashboard(data);
    showToast('Connected to your brain');
  } catch(e) {
    showToast('Connection failed: ' + e.message, 'error');
  }
}

function disconnect() {
  localStorage.removeItem('ob_key');
  API_KEY = '';
  connected = false;
  location.reload();
}

function closeSettings() {
  document.getElementById('settingsOverlay').classList.remove('show');
}

function saveSettings() {
  const key = document.getElementById('settingsKey').value.trim();
  if (key) { API_KEY = key; localStorage.setItem('ob_key', key); }
  closeSettings();
  if (connected) loadDashboard();
  else connect();
}

document.getElementById('headerRight').addEventListener('click', () => {
  if (connected) {
    document.getElementById('settingsKey').value = API_KEY;
    document.getElementById('settingsOverlay').classList.add('show');
  }
});

// Auto-connect
if (API_KEY) {
  document.getElementById('keyInput').value = API_KEY;
  connect();
}

// ── Navigation ──
document.querySelectorAll('.nav-item').forEach(btn => {
  btn.addEventListener('click', () => {
    if (!connected) return;
    document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const tab = btn.dataset.tab;
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(tab + 'Screen').classList.add('active');
    if (tab === 'dashboard') loadDashboard();
    if (tab === 'recent') loadRecent();
    if (tab === 'insights') loadInsights();
  });
});

// ── Dashboard ──
async function loadDashboard(statsData) {
  try {
    const stats = statsData || await api('/api/stats');
    document.getElementById('headerRight').textContent = `${stats.total_thoughts || 0} thoughts`;
    renderStats(stats);
    renderDonut(stats.counts_by_type || stats.by_type || {});
    renderHeatmap(stats);
    renderTopics(stats.top_topics || []);
    renderPeople(stats.top_people || []);
  } catch(e) { console.error('Dashboard load error:', e); }
}

function renderStats(stats) {
  const grid = document.getElementById('statsGrid');
  const items = [
    { label: 'Total Thoughts', value: stats.total_thoughts || 0 },
    { label: 'Types', value: stats.type_count || Object.keys(stats.counts_by_type || stats.by_type || {}).length || 0 },
    { label: 'Topics', value: (stats.top_topics || []).length },
    { label: 'People', value: (stats.top_people || []).length }
  ];
  grid.innerHTML = items.map((item, i) => `
    <div class="stat-card fade-in" style="animation-delay:${i*0.08}s">
      <div class="stat-label">${item.label}</div>
      <div class="stat-number">${item.value}</div>
    </div>
  `).join('');
}

function renderDonut(byType) {
  const container = document.getElementById('donutChart');
  const legend = document.getElementById('donutLegend');
  let data = [];
  if (Array.isArray(byType)) {
    data = byType.map(t => ({ type: t.type || t.name || 'untyped', count: t.count || t.value || 0 }));
  } else if (typeof byType === 'object') {
    data = Object.entries(byType).map(([k, v]) => ({ type: k, count: typeof v === 'number' ? v : (v.count || 0) }));
  }
  data.sort((a, b) => b.count - a.count);
  const total = data.reduce((s, d) => s + d.count, 0) || 1;
  const colors = {
    idea: 'var(--type-idea)', question: 'var(--type-question)',
    task: 'var(--type-task)', reference: 'var(--type-reference)',
    observation: 'var(--type-observation)', decision: 'var(--type-decision)',
    null: 'var(--type-untyped)', untyped: 'var(--type-untyped)'
  };

  const size = 110, r = 42, cx = size/2, cy = size/2, sw = 12;
  let angle = -90;
  let paths = '';
  data.forEach(d => {
    const pct = d.count / total;
    const a1 = angle * Math.PI / 180;
    angle += pct * 360;
    const a2 = angle * Math.PI / 180;
    const large = pct > 0.5 ? 1 : 0;
    const x1 = cx + r * Math.cos(a1), y1 = cy + r * Math.sin(a1);
    const x2 = cx + r * Math.cos(a2), y2 = cy + r * Math.sin(a2);
    const color = colors[d.type] || colors['untyped'];
    paths += `<path d="M${x1},${y1} A${r},${r} 0 ${large},1 ${x2},${y2}" fill="none" stroke="${color}" stroke-width="${sw}" stroke-linecap="round"/>`;
  });
  container.innerHTML = `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">${paths}
    <text x="${cx}" y="${cy}" text-anchor="middle" dominant-baseline="central" fill="var(--ink-primary)" font-size="22" font-weight="600" font-family="EB Garamond, serif">${total}</text></svg>`;
  legend.innerHTML = data.slice(0, 6).map(d => {
    const color = colors[d.type] || colors['untyped'];
    return `<div class="legend-item"><div class="legend-left"><span class="legend-dot" style="background:${color}"></span><span>${d.type || 'untyped'}</span></div><span class="legend-count">${d.count}</span></div>`;
  }).join('');
}

function renderHeatmap(stats) {
  const grid = document.getElementById('heatmapGrid');
  const cells = [];
  for (let i = 0; i < 91; i++) {
    const intensity = Math.random();
    let bg;
    if (intensity < 0.15) bg = 'var(--bg-page-alt)';
    else if (intensity < 0.35) bg = 'rgba(139,107,61,0.1)';
    else if (intensity < 0.55) bg = 'rgba(139,107,61,0.2)';
    else if (intensity < 0.75) bg = 'rgba(139,107,61,0.35)';
    else bg = 'rgba(139,107,61,0.5)';
    cells.push(`<div class="heatmap-cell" style="background:${bg}"></div>`);
  }
  grid.innerHTML = cells.join('');
}

function renderTopics(topics) {
  const cloud = document.getElementById('tagCloud');
  cloud.innerHTML = topics.slice(0, 15).map(t => {
    const name = t.topic || t.name || t;
    return `<span class="tag-pill">${name}</span>`;
  }).join('');
}

function renderPeople(people) {
  const row = document.getElementById('peopleRow');
  const hues = [25, 45, 200, 160, 280, 340, 100, 60, 320, 220];
  row.innerHTML = people.slice(0, 10).map((p, i) => {
    const name = p.person || p.name || p;
    const initials = name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
    const h = hues[i % hues.length];
    return `<div class="person-circle" style="background:hsl(${h},35%,45%)" title="${name}">${initials}</div>`;
  }).join('');
}

// ── Capture ──
document.querySelectorAll('.quick-type-pill').forEach(pill => {
  pill.addEventListener('click', () => {
    const wasActive = pill.classList.contains('active');
    document.querySelectorAll('.quick-type-pill').forEach(p => p.classList.remove('active'));
    if (!wasActive) pill.classList.add('active');
  });
});

async function captureThought() {
  const text = document.getElementById('captureText').value.trim();
  if (!text) return;
  const btn = document.getElementById('captureBtn');
  btn.disabled = true; btn.textContent = 'Capturing...';
  const source = document.getElementById('captureSource').value.trim() || undefined;
  const activeType = document.querySelector('.quick-type-pill.active');
  try {
    const body = { text };
    if (source) body.source_context = { source };
    const res = await api('/api/capture', { method: 'POST', body });
    showToast('Thought captured');
    document.getElementById('captureText').value = '';
    document.getElementById('captureSource').value = '';
    document.querySelectorAll('.quick-type-pill').forEach(p => p.classList.remove('active'));

    const thought = res.thought || res;
    recentCaptures.unshift({
      text,
      content: text,
      type: thought.type || (activeType ? activeType.dataset.type : null),
      topics: thought.topics || [],
      created_at: new Date().toISOString()
    });
    renderRecentCaptures();
  } catch(e) {
    showToast('Capture failed: ' + e.message, 'error');
  }
  btn.disabled = false; btn.textContent = 'Capture';
}

function renderRecentCaptures() {
  const section = document.getElementById('recentlyCapSection');
  const container = document.getElementById('recentlyCaptured');
  if (recentCaptures.length === 0) { section.style.display = 'none'; return; }
  section.style.display = 'block';
  container.innerHTML = recentCaptures.slice(0, 5).map((c, idx) => `
    <div class="card card-interactive fade-in" style="cursor:pointer" onclick="showThoughtModal(recentCaptures[${idx}])">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
        <span class="type-badge ${c.type || 'untyped'}">${c.type || 'untyped'}</span>
        <span style="font-size:11px;color:var(--ink-faint);font-style:italic">just now</span>
      </div>
      <div style="font-family:var(--serif);font-size:14px;line-height:1.6;color:var(--ink-secondary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${c.text}</div>
      ${c.topics.length ? `<div style="display:flex;gap:4px;margin-top:6px;flex-wrap:wrap">${c.topics.map(t => `<span class="topic-tag">${t}</span>`).join('')}</div>` : ''}
    </div>
  `).join('');
}

// ── Search ──
document.getElementById('searchInput').addEventListener('keydown', e => { if (e.key === 'Enter') searchThoughts(); });

document.querySelectorAll('#searchFilters .filter-chip').forEach(chip => {
  chip.addEventListener('click', () => {
    document.querySelectorAll('#searchFilters .filter-chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    // Re-search if we have results
    if (document.getElementById('searchInput').value.trim()) searchThoughts();
  });
});

async function searchThoughts() {
  const query = document.getElementById('searchInput').value.trim();
  if (!query) return;
  const container = document.getElementById('searchResults');
  container.innerHTML = '<div class="skeleton" style="height:80px;margin-bottom:10px"></div><div class="skeleton" style="height:80px;margin-bottom:10px"></div><div class="skeleton" style="height:80px"></div>';
  try {
    const data = await api(`/api/search?q=${encodeURIComponent(query)}&limit=20`);
    const results = data.results || data;
    const activeFilter = document.querySelector('#searchFilters .filter-chip.active')?.dataset.filter;
    const filtered = activeFilter && activeFilter !== 'all' ? results.filter(r => r.type === activeFilter) : results;
    if (filtered.length === 0) {
      container.innerHTML = '<div class="search-empty"><p>No matching thoughts found</p></div>';
      return;
    }
    allThoughts = filtered; // cache for modal
    container.innerHTML = filtered.map((r, idx) => {
      const score = r.similarity != null ? Math.round(r.similarity * 100) : null;
      const topics = r.topics || [];
      const type = r.type || 'untyped';
      const date = r.created_at ? new Date(r.created_at).toLocaleDateString('en-GB', { day:'numeric', month:'short' }) : '';
      return `<div class="card card-interactive result-card fade-in" style="cursor:pointer;animation-delay:${idx*0.05}s" onclick="showThoughtModal(allThoughts[${idx}])">
        <div class="result-header">
          <span class="type-badge ${type}">${type}</span>
          ${score !== null ? `<div class="result-score"><div class="score-bar"><div class="score-fill" style="width:${score}%"></div></div>${score}%</div>` : ''}
        </div>
        <div class="result-content">${(r.content || '').slice(0, 200)}${(r.content || '').length > 200 ? '...' : ''}</div>
        <div class="result-meta">
          ${topics.slice(0, 3).map(t => `<span class="topic-tag">${t}</span>`).join('')}
          <span class="result-date">${date}</span>
        </div>
      </div>`;
    }).join('');
  } catch(e) {
    container.innerHTML = `<div class="search-empty"><p>Search failed: ${e.message}</p></div>`;
  }
}

// ── Recent ──
let recentThoughts = [];

async function loadRecent() {
  const timeline = document.getElementById('timeline');
  timeline.innerHTML = '<div class="skeleton" style="height:60px;margin-bottom:10px;margin-left:28px"></div>'.repeat(4);
  const typeFilter = document.getElementById('recentTypeFilter').value;
  const days = document.getElementById('recentTimeFilter').value;
  try {
    let url = `/api/recent?limit=50&since_days=${days}`;
    if (typeFilter) url += `&type=${typeFilter}`;
    const data = await api(url);
    const items = data.thoughts || data.results || data;
    recentThoughts = items; // cache for modal
    if (!items.length) {
      timeline.innerHTML = '<p style="color:var(--ink-faint);text-align:center;padding:40px;font-family:var(--serif);font-style:italic">No recent thoughts</p>';
      return;
    }
    const groups = groupByDay(items);
    timeline.innerHTML = '';
    groups.forEach(group => {
      const dayEl = document.createElement('div');
      dayEl.className = 'day-group';
      dayEl.innerHTML = `<div class="day-label"><div class="day-dot"></div>${group.label}</div>
        <div class="timeline-cards">${group.items.map((item, itemIdx) => {
          const type = item.type || 'untyped';
          const topics = item.topics || [];
          const time = new Date(item.created_at).toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' });
          const globalIdx = recentThoughts.indexOf(item);
          return `<div class="card card-interactive timeline-card" onclick="showThoughtModal(recentThoughts[${globalIdx}])">
            <div class="timeline-card-header">
              <span class="type-badge ${type}">${type}</span>
              <span style="font-size:11px;color:var(--ink-faint);font-style:italic">${time}</span>
            </div>
            <div class="timeline-card-content">${(item.content || '').slice(0, 140)}${(item.content || '').length > 140 ? '...' : ''}</div>
            ${topics.length ? `<div class="timeline-card-tags">${topics.slice(0, 4).map(t => `<span class="topic-tag">${t}</span>`).join('')}</div>` : ''}
          </div>`;
        }).join('')}</div>`;
      timeline.appendChild(dayEl);
    });
  } catch(e) { timeline.innerHTML = `<p style="color:var(--ink-faint);text-align:center">Error: ${e.message}</p>`; }
}

document.getElementById('recentTypeFilter').addEventListener('change', loadRecent);
document.getElementById('recentTimeFilter').addEventListener('change', loadRecent);

function groupByDay(items) {
  const now = new Date();
  const today = now.toDateString();
  const yesterday = new Date(now - 86400000).toDateString();
  const groups = {};
  items.forEach(item => {
    const d = new Date(item.created_at);
    const ds = d.toDateString();
    let label;
    if (ds === today) label = 'Today';
    else if (ds === yesterday) label = 'Yesterday';
    else {
      const diff = Math.floor((now - d) / 86400000);
      label = diff <= 7 ? 'This Week' : d.toLocaleDateString('en-GB', { day:'numeric', month:'long' });
    }
    if (!groups[label]) groups[label] = [];
    groups[label].push(item);
  });
  const order = ['Today', 'Yesterday', 'This Week'];
  return Object.entries(groups)
    .sort((a, b) => {
      const ai = order.indexOf(a[0]), bi = order.indexOf(b[0]);
      if (ai !== -1 && bi !== -1) return ai - bi;
      if (ai !== -1) return -1;
      if (bi !== -1) return 1;
      return 0;
    })
    .map(([label, items]) => ({ label, items }));
}

// ── Insights ──
const signals = [
  { id: 'network', label: 'Network', icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="M8.59 13.51l6.83 3.98M15.41 6.51l-6.82 3.98"/></svg>' },
  { id: 'resonance', label: 'Resonance', icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 12h2l3-9 4 18 4-18 3 9h4"/></svg>' },
  { id: 'bridges', label: 'People', icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>' },
  { id: 'timeline', label: 'Timeline', icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>' },
  { id: 'clusters', label: 'Clusters', icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="4"/><circle cx="12" cy="12" r="1"/></svg>' },
];

let activeSignal = 'network';

function loadInsights() {
  const pills = document.getElementById('signalPills');
  pills.innerHTML = signals.map(s =>
    `<button class="signal-pill ${s.id === activeSignal ? 'active' : ''}" data-signal="${s.id}">${s.icon}${s.label}</button>`
  ).join('');
  pills.querySelectorAll('.signal-pill').forEach(p => {
    p.addEventListener('click', () => {
      activeSignal = p.dataset.signal;
      loadInsights();
    });
  });
  loadSignal(activeSignal);
}

async function loadSignal(signal) {
  const container = document.getElementById('insightContent');
  container.innerHTML = '<div class="skeleton" style="height:350px;margin-bottom:16px"></div>';
  try {
    if (signal === 'network') {
      const data = await api('/api/analyze/topics');
      renderNetwork(data, container);
    } else if (signal === 'resonance') {
      const data = await api('/api/stats');
      renderResonance(data, container);
    } else if (signal === 'bridges') {
      const data = await api('/api/analyze/people');
      renderBridges(data, container);
    } else if (signal === 'timeline') {
      const data = await api('/api/analyze/timeline');
      renderTimeline(data, container);
    } else if (signal === 'clusters') {
      const data = await api('/api/analyze/clusters');
      renderClusters(data, container);
    } else {
      container.innerHTML = `<div class="card" style="padding:40px;text-align:center;color:var(--ink-faint)"><p>Coming soon</p></div>`;
    }
  } catch(e) {
    container.innerHTML = `<div class="card" style="padding:40px;text-align:center;color:var(--ink-faint)"><p>Could not load ${signal}: ${e.message}</p></div>`;
  }
}

function toArray(val) {
  if (Array.isArray(val)) return val;
  if (val && typeof val === 'object') return Object.entries(val).map(([k, v]) => typeof v === 'object' ? { name: k, ...v } : { name: k, count: v });
  return [];
}

function renderNetwork(data, container) {
  // API returns: { topic_graph: [{ topic_a, topic_b, co_occurrences, example_thought_id }] }
  const pairs = data.topic_graph || [];
  if (!pairs.length) {
    container.innerHTML = `<div class="card" style="padding:40px;text-align:center;color:var(--ink-faint)"><p>No topic network data available</p></div>`;
    return;
  }

  // Extract unique topics and count their total co-occurrences
  const topicWeights = {};
  pairs.forEach(p => {
    topicWeights[p.topic_a] = (topicWeights[p.topic_a] || 0) + (p.co_occurrences || 1);
    topicWeights[p.topic_b] = (topicWeights[p.topic_b] || 0) + (p.co_occurrences || 1);
  });

  const nodes = Object.entries(topicWeights).map(([name, weight]) => ({
    id: name, type: 'topic', r: Math.max(10, Math.min(30, Math.sqrt(weight) * 5))
  }));

  const links = pairs.map(p => ({
    source: p.topic_a, target: p.topic_b, value: p.co_occurrences || 1
  }));

  const width = Math.min(600, window.innerWidth - 32);
  const height = 350;
  container.innerHTML = `<div class="graph-container" style="height:${height}px;position:relative">
    <div class="graph-legend"><div class="graph-legend-item"><span style="width:6px;height:6px;border-radius:50%;background:var(--accent)"></span>Topic</div></div>
    <svg id="networkSvg"></svg></div>
    <div class="insight-stats"><div class="card"><div class="stat-label">Topics</div><div class="insight-stat-number">${nodes.length}</div></div>
    <div class="card"><div class="stat-label">Connections</div><div class="insight-stat-number">${links.length}</div></div></div>`;

  const svg = d3.select('#networkSvg').attr('width', width).attr('height', height);
  const maxLinkVal = Math.max(...links.map(l => l.value), 1);
  const sim = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(links).id(d => d.id).distance(d => 80 - (d.value / maxLinkVal) * 30))
    .force('charge', d3.forceManyBody().strength(-100))
    .force('center', d3.forceCenter(width / 2, height / 2))
    .force('collision', d3.forceCollide(d => d.r + 6));

  const link = svg.selectAll('line').data(links).enter().append('line')
    .attr('stroke', 'var(--border)').attr('stroke-width', d => Math.max(1, (d.value / maxLinkVal) * 3))
    .attr('stroke-opacity', d => 0.3 + (d.value / maxLinkVal) * 0.5);
  const node = svg.selectAll('g').data(nodes).enter().append('g').call(
    d3.drag().on('start', (e, d) => { if (!e.active) sim.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
    .on('drag', (e, d) => { d.fx = e.x; d.fy = e.y; })
    .on('end', (e, d) => { if (!e.active) sim.alphaTarget(0); d.fx = null; d.fy = null; })
  );
  node.append('circle').attr('r', d => d.r)
    .attr('fill', 'rgba(139,107,61,0.15)')
    .attr('stroke', 'var(--accent)').attr('stroke-width', 1.5);
  node.append('text').text(d => d.id)
    .attr('fill', 'var(--ink-secondary)').attr('font-size', d => Math.max(9, d.r * 0.45))
    .attr('text-anchor', 'middle').attr('dy', d => d.r + 14)
    .style('font-family', 'EB Garamond, serif');

  sim.on('tick', () => {
    link.attr('x1', d => d.source.x).attr('y1', d => d.source.y).attr('x2', d => d.target.x).attr('y2', d => d.target.y);
    node.attr('transform', d => `translate(${d.x},${d.y})`);
  });
}

function renderResonance(data, container) {
  // API /api/stats returns: { top_topics: [{ topic, count }], ... }
  const topics = (data.top_topics || []).slice(0, 12);
  if (!topics.length) {
    container.innerHTML = `<div class="card" style="padding:40px;text-align:center;color:var(--ink-faint)"><p>No topic data available</p></div>`;
    return;
  }
  const maxCount = Math.max(...topics.map(t => t.count || 0), 1);
  container.innerHTML = `<div class="card"><div class="section-label">Topic Strength</div>
    ${topics.map(t => {
      const name = t.topic || t.name || 'unknown';
      const count = t.count || 0;
      const pct = Math.min(100, (count / maxCount) * 100);
      return `<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
        <span style="font-family:var(--serif);font-size:14px;color:var(--ink-secondary);min-width:100px;text-transform:capitalize">${name}</span>
        <div style="flex:1;height:6px;background:var(--bg-page-alt);border-radius:3px;overflow:hidden">
          <div style="width:${pct}%;height:100%;background:var(--accent);border-radius:3px;transition:width 0.5s"></div>
        </div>
        <span style="font-size:11px;color:var(--ink-faint);min-width:24px;text-align:right">${count}</span>
      </div>`;
    }).join('')}
  </div>`;
}

function renderBridges(data, container) {
  // API returns: { people_network: [{ person_a, person_b, shared_thoughts, shared_topics }] }
  const pairs = data.people_network || [];
  if (!pairs.length) {
    container.innerHTML = `<div class="card" style="padding:40px;text-align:center;color:var(--ink-faint)"><p>No people network data available</p></div>`;
    return;
  }
  container.innerHTML = `<div class="card"><div class="section-label">People Network</div>
    ${pairs.slice(0, 10).map(p => {
      const sharedTopics = (p.shared_topics || []).slice(0, 3);
      return `<div class="pattern-item">
        <div class="pattern-icon"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></div>
        <div style="flex:1">
          <div class="pattern-text">${p.person_a} &amp; ${p.person_b}</div>
          <div class="pattern-sub">${p.shared_thoughts || 0} shared thought${(p.shared_thoughts || 0) !== 1 ? 's' : ''}${sharedTopics.length ? ' · ' + sharedTopics.join(', ') : ''}</div>
        </div>
      </div>`;
    }).join('')}
  </div>`;
}

function renderTimeline(data, container) {
  // API returns: { timeline: [{ period, thought_count, top_topics }] }
  const entries = data.timeline || [];
  if (!entries.length) {
    container.innerHTML = `<div class="card" style="padding:40px;text-align:center;color:var(--ink-faint)"><p>No timeline data available</p></div>`;
    return;
  }
  const maxVal = Math.max(...entries.map(x => x.thought_count || 0), 1);
  container.innerHTML = `<div class="card"><div class="section-label">Activity Over Time</div>
    <div style="padding:8px 0">${entries.slice(0, 14).map(e => {
      const label = e.period || '';
      const count = e.thought_count || 0;
      const pct = maxVal > 0 ? (count / maxVal) * 100 : 0;
      const topics = (e.top_topics || []).slice(0, 3);
      return `<div style="margin-bottom:12px">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:4px">
          <span style="font-size:12px;color:var(--ink-muted);min-width:80px;font-weight:500">${label}</span>
          <div style="flex:1;height:6px;background:var(--bg-page-alt);border-radius:3px;overflow:hidden">
            <div style="width:${pct}%;height:100%;background:var(--accent);border-radius:3px;transition:width 0.5s"></div>
          </div>
          <span style="font-size:11px;color:var(--ink-faint);min-width:24px;text-align:right">${count}</span>
        </div>
        ${topics.length ? `<div style="margin-left:90px;display:flex;gap:4px;flex-wrap:wrap">${topics.map(t => `<span class="topic-tag" style="font-size:10px">${t}</span>`).join('')}</div>` : ''}
      </div>`;
    }).join('')}</div>
  </div>`;
}

function renderClusters(data, container) {
  // API returns: { clusters: [{ primary_topic, thought_count, related_topics, types: {idea: N, ...}, date_range: {earliest, latest} }] }
  const items = data.clusters || [];
  if (!items.length) {
    container.innerHTML = `<div class="card" style="padding:40px;text-align:center;color:var(--ink-faint)"><p>No cluster data available</p></div>`;
    return;
  }
  container.innerHTML = `<div class="card"><div class="section-label">Thought Clusters</div>
    ${items.slice(0, 8).map(c => {
      const name = c.primary_topic || 'Unnamed';
      const count = c.thought_count || 0;
      const related = (c.related_topics || []).slice(0, 4);
      const types = c.types ? Object.entries(c.types).filter(([k,v]) => v > 0 && k !== 'null' && k !== 'untyped').sort((a,b) => b[1] - a[1]).slice(0, 3) : [];
      return `<div class="pattern-item" style="flex-wrap:wrap">
        <div class="pattern-icon" style="border-radius:var(--radius-sm)"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="4"/></svg></div>
        <div style="flex:1;min-width:0">
          <div class="pattern-text" style="text-transform:capitalize">${name}</div>
          <div class="pattern-sub">${count} thought${count !== 1 ? 's' : ''}${types.length ? ' · ' + types.map(([t,n]) => t + ': ' + n).join(', ') : ''}</div>
          ${related.length ? `<div style="display:flex;gap:4px;margin-top:4px;flex-wrap:wrap">${related.map(r => `<span class="topic-tag" style="font-size:10px">${r}</span>`).join('')}</div>` : ''}
        </div>
      </div>`;
    }).join('')}
  </div>`;
}
